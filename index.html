<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Matrix Tetris</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <div id="game-console">
        <div id="screen-container">
            <canvas id="tetris" width="240" height="400"></canvas>
            <div id="side-panel">
                <div class="panel-box">
                    <span>NEXT</span>
                    <canvas id="next" width="80" height="80"></canvas>
                </div>
                <div class="panel-box">
                    <span>SCORE</span>
                    <div id="score">0</div>
                </div>
                <div class="panel-box">
                    <span>RECORD</span>
                    <div id="highscore">0</div>
                </div>
                <div class="panel-box">
                    <span>SPEED</span>
                    <div id="speed-val">0</div>
                </div>
                <div class="speed-up-container">
                    <div id="speed-bar"></div>
                </div>
            </div>
        </div>

        <div id="menu">
            <h3>SELECT SPEED (0-10)</h3>
            <input type="number" id="speed-input" min="0" max="10" value="0">
            <br>
            <button id="start-btn">START GAME</button>
        </div>

        <div id="controls">
            <div class="brand-name">MATRIX</div>
            <div class="d-pad">
                <button class="ctrl-btn" id="left">◀</button>
                <div class="d-pad-center">
                    <button class="ctrl-btn" id="rotate">ROT</button>
                    <button class="ctrl-btn" id="down">▼</button>
                </div>
                <button class="ctrl-btn" id="right">▶</button>
            </div>
            <div class="system-btns">
                <button class="sys-btn" id="pause">PAUSE</button>
                <button class="sys-btn reset" id="reset">RESET</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
