<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Matrix Ultimate Console FIXED</title>
    <style>
        :root { --neon: #0f0; --neon-bright: #5f5; --bg-dark: #000; }
        body { 
            background: #000; color: var(--neon); font-family: 'Courier New', monospace; 
            margin: 0; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; touch-action: none;
        }
        #matrix-bg { position: fixed; top: 0; left: 0; z-index: -1; opacity: 0.4; }
        .console-body {
            background: linear-gradient(145deg, #333, #111); border: 4px solid #444; border-radius: 40px 40px 100px 40px;
            padding: 35px; box-shadow: 0 40px 100px rgba(0,0,0,0.9), 0 0 20px rgba(0,255,0,0.1);
            display: flex; flex-direction: column; align-items: center; position: relative;
        }
        .screen-frame {
            background: #000; border: 12px solid #222; outline: 2px solid #555; border-radius: 15px;
            display: flex; gap: 20px; padding: 20px; box-shadow: inset 0 0 40px #000, 0 0 15px rgba(0,255,0,0.2);
        }
        canvas { border: 2px solid #030; background: #000; }
        .side-info { display: flex; flex-direction: column; width: 110px; gap: 15px; }
        .box { background: #080808; border: 2px solid #222; padding: 10px; text-align: center; border-radius: 8px; }
        .label { font-size: 11px; color: #0a0; text-transform: uppercase; font-weight: bold; margin-bottom: 5px; }
        .value { font-size: 20px; font-weight: bold; color: #fff; text-shadow: 0 0 10px var(--neon); }
        .value.top { color: #ff0; text-shadow: 0 0 10px #ff0; }
        .controls-area { margin-top: 45px; width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 0 10px; }
        .d-pad { display: grid; grid-template-columns: repeat(3, 55px); grid-template-rows: repeat(3, 55px); }
        .d-btn {
            background: #252525; border: 1px solid #444; color: #aaa;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
            font-size: 24px; box-shadow: 0 5px 0 #000; transition: 0.1s; user-select: none;
        }
        .d-btn:active { background: var(--neon); color: #000; transform: translateY(3px); box-shadow: 0 2px 0 #000; }
        .d-up { grid-column: 2; grid-row: 1; border-radius: 10px 10px 0 0; }
        .d-left { grid-column: 1; grid-row: 2; border-radius: 10px 0 0 10px; }
        .d-right { grid-column: 3; grid-row: 2; border-radius: 0 10px 10px 0; }
        .d-down { grid-column: 2; grid-row: 3; border-radius: 0 0 10px 10px; }
        .btn-rot {
            width: 85px; height: 85px; background: linear-gradient(145deg, #d00, #800);
            border: 4px solid #500; border-radius: 50%; color: #fff; font-weight: bold;
            font-size: 18px; display: flex; align-items: center; justify-content: center; box-shadow: 0 6px 0 #400; cursor: pointer;
        }
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 35px;
        }
        input { background: #000; border: 2px solid #0f0; color: #0f0; padding: 10px; width: 60px; text-align: center; margin: 15px; font-size: 24px; outline: none; }
        .start-btn { background: #0f0; color: #000; padding: 15px 40px; border: none; font-weight: bold; font-size: 18px; cursor: pointer; border-radius: 5px; }
        .pause-msg { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 30px; font-weight: bold; color: #fff; background: rgba(0,100,0,0.7); padding: 10px 20px; border-radius: 5px; display: none; pointer-events: none; z-index: 50; }
    </style>
</head>
<body>

<canvas id="matrix-bg"></canvas>
<div class="console-body">
    <div id="overlay">
        <h1 style="color:#0f0">MATRIX ULTIMATE</h1>
        <div class="label">HIGH SCORE</div>
        <div id="highscore_overlay" class="value top" style="font-size: 30px; margin-bottom: 10px;">0</div>
        <div class="label">SET START LEVEL</div>
        <input type="number" id="startLevel" value="0" min="0" max="20">
        <button class="start-btn" onclick="startGame()">INITIALIZE</button>
    </div>
    <div class="pause-msg" id="pauseLabel">SYSTEM PAUSED</div>
    <div class="screen-frame">
        <canvas id="tetris" width="200" height="400"></canvas>
        <div class="side-info">
            <div class="box"><div class="label">NEXT</div><canvas id="next" width="80" height="80"></canvas></div>
            <div class="box"><div class="label">TOP</div><div id="highscore" class="value top">0</div></div>
            <div class="box"><div class="label">SCORE</div><div id="score" class="value">0</div></div>
            <div class="box"><div class="label">LEVEL</div><div id="level" class="value">0</div></div>
            <button onclick="togglePause()" style="background:#444; color:#fff; border:none; padding:8px; border-radius:4px; margin-top:auto; cursor:pointer;">PAUSE</button>
        </div>
    </div>
    <div class="controls-area">
        <div class="d-pad">
            <div class="d-btn d-up" onclick="playerHardDrop()">⚡</div>
            <div class="d-btn d-left" onclick="playerMove(-1)">◀</div>
            <div style="background:transparent"></div>
            <div class="d-btn d-right" onclick="playerMove(1)">▶</div>
            <div class="d-btn d-down" onclick="playerDrop()">▼</div>
        </div>
        <div class="action-btns"><div class="btn-rot" onclick="playerRotate()">ROTATE</div></div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
